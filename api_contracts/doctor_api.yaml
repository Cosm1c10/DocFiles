openapi: 3.0.3
info:
  title: Doctor Portal API
  description: |
    Production-grade API specification for the Doctor Portal healthcare SaaS platform.
    Integrates Supabase backend with Google Gemini AI for clinical report analysis.

    ## Security
    - All endpoints require JWT authentication via Supabase Auth
    - RLS policies enforce data access control
    - Audit logging for all operations
    - HIPAA-compliant data handling

    ## Rate Limits
    - Standard: 100 requests/minute
    - AI Analysis: 10 requests/minute per doctor

  version: 1.0.0
  contact:
    name: Healthcare SaaS Support
    email: support@healthportal.demo

servers:
  - url: https://your-project.supabase.co
    description: Production Supabase instance
  - url: http://localhost:54321
    description: Local development

tags:
  - name: Reports
    description: Medical report management and AI analysis
  - name: Appointments
    description: Consultation scheduling and management
  - name: Messages
    description: Secure doctor-patient messaging
  - name: Patients
    description: Patient records and consents

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase JWT token from auth.getSession()

  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Invalid token

    AISummary:
      type: object
      required:
        - summary
        - priority
        - flags
        - questions
        - recommended_tests
      properties:
        summary:
          type: string
          description: 2-3 sentence clinical summary
          example: "Lipid panel shows elevated LDL cholesterol at 180 mg/dL and low HDL at 35 mg/dL, suggesting increased cardiovascular risk."
        priority:
          type: string
          enum: [normal, urgent, critical]
          example: urgent
        flags:
          type: array
          items:
            $ref: '#/components/schemas/AIFlag'
        questions:
          type: array
          items:
            type: string
          example:
            - "Are you currently taking any cholesterol-lowering medications?"
            - "Have you experienced any chest pain recently?"
        recommended_tests:
          type: array
          items:
            type: string
          example:
            - "HbA1c test to assess long-term glucose control"
            - "Cardiac stress test if symptomatic"

    AIFlag:
      type: object
      required:
        - label
        - value
        - reason
        - source_snippet
      properties:
        label:
          type: string
          example: "LDL Cholesterol"
        value:
          type: string
          example: "180 mg/dL"
        reason:
          type: string
          example: "Significantly elevated; optimal is <100 mg/dL, high risk is >160 mg/dL"
        source_snippet:
          type: string
          example: "LDL Cholesterol: 180 mg/dL (Reference: <100 mg/dL)"

    Report:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        title:
          type: string
          example: "Lipid Panel Results"
        file_path:
          type: string
          example: "reports/patient123/lipid-panel-2024.pdf"
        file_mime:
          type: string
          example: "application/pdf"
        ai_summary:
          $ref: '#/components/schemas/AISummary'
        ai_tags:
          type: array
          items:
            type: string
          example: ["LDL Cholesterol", "HDL Cholesterol", "Fasting Glucose"]
        report_date:
          type: string
          format: date
        report_type:
          type: string
          enum: [lab_report, imaging, prescription, medical_history, vaccination, other]
        created_at:
          type: string
          format: date-time

    Appointment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        patient_id:
          type: string
          format: uuid
        doctor_id:
          type: string
          format: uuid
        scheduled_at:
          type: string
          format: date-time
        duration_minutes:
          type: integer
          example: 30
        status:
          type: string
          enum: [scheduled, confirmed, in_progress, completed, cancelled, no_show]
        appointment_type:
          type: string
          enum: [consultation, follow_up, emergency, routine_checkup]
        meet_link:
          type: string
          format: uri
          example: "https://meet.google.com/abc-defg-hij"
        patient_notes:
          type: string
        doctor_notes:
          type: string

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        recipient_id:
          type: string
          format: uuid
        content:
          type: string
          maxLength: 5000
        message_type:
          type: string
          enum: [text, file, system, template]
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

paths:
  /functions/v1/reports_analyze:
    post:
      tags:
        - Reports
      summary: Analyze medical report with AI
      description: |
        Processes a medical report using Google Gemini AI to extract clinical insights.

        **Workflow:**
        1. Validates user authorization and consent
        2. Generates signed URL for report file
        3. Performs OCR if needed (images/PDFs)
        4. Calls Gemini API with clinical prompt
        5. Validates AI response against JSON schema
        6. Updates report with AI summary and tags
        7. Logs to audit trail
        8. Sends realtime notification if critical

        **Safety:**
        - Temperature set to 0.0 for deterministic output
        - Source snippets required for all flags
        - Conservative clinical language enforced
        - Retry logic with validation

      operationId: analyzeReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - report_id
              properties:
                report_id:
                  type: string
                  format: uuid
                  description: UUID of the report to analyze
                force_reprocess:
                  type: boolean
                  default: false
                  description: Force reprocessing even if AI summary exists
            examples:
              basic:
                summary: Basic analysis request
                value:
                  report_id: "123e4567-e89b-12d3-a456-426614174000"
              force:
                summary: Force reprocessing
                value:
                  report_id: "123e4567-e89b-12d3-a456-426614174000"
                  force_reprocess: true

      responses:
        '200':
          description: AI analysis completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  ai_summary:
                    $ref: '#/components/schemas/AISummary'
                  priority:
                    type: string
                    enum: [normal, urgent, critical]
                  cached:
                    type: boolean
                    description: True if summary was retrieved from cache
              examples:
                success:
                  summary: Successful analysis
                  value:
                    ok: true
                    priority: urgent
                    ai_summary:
                      summary: "Lipid panel shows elevated LDL cholesterol at 180 mg/dL and low HDL at 35 mg/dL."
                      priority: urgent
                      flags:
                        - label: "LDL Cholesterol"
                          value: "180 mg/dL"
                          reason: "Significantly elevated; optimal is <100 mg/dL"
                          source_snippet: "LDL Cholesterol: 180 mg/dL (Reference: <100 mg/dL)"
                      questions:
                        - "Are you currently taking any cholesterol medications?"
                      recommended_tests:
                        - "HbA1c test"
                cached:
                  summary: Retrieved from cache
                  value:
                    ok: true
                    priority: normal
                    cached: true
                    ai_summary:
                      summary: "All values within normal range."
                      priority: normal
                      flags: []
                      questions: []
                      recommended_tests: []

        '401':
          description: Unauthorized - Invalid or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: UNAUTHORIZED
                message: Invalid token

        '403':
          description: Forbidden - No consent to access report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: NO_CONSENT
                message: No access to this report

        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: REPORT_NOT_FOUND

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ai_failed:
                  summary: AI processing failed
                  value:
                    error: AI_REQUEST_FAILED
                    message: "Gemini API request failed: 500"
                validation:
                  summary: AI validation failed
                  value:
                    error: AI_VALIDATION_FAILED
                    message: "Missing required key: summary"

  /rest/v1/reports:
    get:
      tags:
        - Reports
      summary: List reports
      description: Retrieve reports for accessible patients (with RLS enforcement)
      operationId: listReports
      parameters:
        - name: patient_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by patient ID
        - name: report_type
          in: query
          schema:
            type: string
            enum: [lab_report, imaging, prescription, medical_history, vaccination, other]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Report'

    post:
      tags:
        - Reports
      summary: Upload new report
      description: Patients can upload their own medical reports
      operationId: createReport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - title
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                report_type:
                  type: string
                  enum: [lab_report, imaging, prescription, medical_history, vaccination, other]
                report_date:
                  type: string
                  format: date
      responses:
        '201':
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'

  /rest/v1/reports/{id}/view:
    get:
      tags:
        - Reports
      summary: Get report with signed URL
      description: Retrieve report details with a signed URL for file access (consent-based)
      operationId: viewReport
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Report details with signed URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: '#/components/schemas/Report'
                  signedUrl:
                    type: string
                    format: uri
                    description: Temporary signed URL for file download (valid 1 hour)
              example:
                report:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  title: "Blood Test Results"
                  file_mime: "application/pdf"
                signedUrl: "https://storage.supabase.co/..."

        '403':
          description: No consent to view report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /functions/v1/messages_send:
    post:
      tags:
        - Messages
      summary: Send secure message
      description: |
        Send a message between doctor and patient with server-side validation.

        **Security:**
        - Verifies active doctor-patient relationship (via appointments)
        - Sanitizes content to prevent XSS
        - Logs to audit trail
        - Sends realtime notification to recipient

      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - recipient_id
                - content
              properties:
                recipient_id:
                  type: string
                  format: uuid
                content:
                  type: string
                  maxLength: 5000
                appointment_id:
                  type: string
                  format: uuid
                message_type:
                  type: string
                  enum: [text, file, template]
                  default: text
                metadata:
                  type: object
                  properties:
                    template_id:
                      type: string
                    variables:
                      type: object
            examples:
              text:
                summary: Simple text message
                value:
                  recipient_id: "patient-uuid"
                  content: "Hi, I've reviewed your lab results. Everything looks good."
              template:
                summary: Using message template
                value:
                  recipient_id: "patient-uuid"
                  content: ""
                  message_type: template
                  metadata:
                    template_id: "appointment_reminder"
                    variables:
                      patient_name: "John"
                      date: "2024-01-15"
                      time: "2:00 PM"

      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message_id:
                    type: string
                    format: uuid
                  created_at:
                    type: string
                    format: date-time

        '403':
          description: No active doctor-patient relationship
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: NO_ACTIVE_RELATIONSHIP
                message: "No active doctor-patient relationship found"

  /rest/v1/appointments:
    get:
      tags:
        - Appointments
      summary: List appointments
      description: Retrieve appointments for the authenticated doctor
      operationId: listAppointments
      parameters:
        - name: doctor_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, confirmed, in_progress, completed, cancelled]
        - name: scheduled_at
          in: query
          description: Filter by date (gte/lte operators supported)
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

    patch:
      tags:
        - Appointments
      summary: Update appointment
      description: Doctors can update appointment status, notes, and Meet links
      operationId: updateAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [confirmed, in_progress, completed, cancelled]
                doctor_notes:
                  type: string
                meet_link:
                  type: string
                  format: uri
      responses:
        '200':
          description: Appointment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'

  /rest/v1/consents:
    get:
      tags:
        - Patients
      summary: List patient consents
      description: Retrieve consents granted to the authenticated doctor
      operationId: listConsents
      responses:
        '200':
          description: List of consents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    patient_id:
                      type: string
                      format: uuid
                    doctor_id:
                      type: string
                      format: uuid
                    granted:
                      type: boolean
                    consent_type:
                      type: string
                    expires_at:
                      type: string
                      format: date-time
                      nullable: true
